<!DOCTYPE html>
<html>
<head>
  <title>🏦 Bank App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>🏦 Smart Bank App</header>

<div class="container">

  <!-- CREATE -->
  <div class="card">
    <h2>Create Account</h2>
    <input id="name" placeholder="Full Name">
    <input id="dob" placeholder="YYYY-MM-DD">
    <input id="mobile" placeholder="Mobile Number">
    <input id="email" placeholder="Email">
    <input id="address" placeholder="Address">
    <input id="aadhar" placeholder="Aadhar Number">
    <input id="bank" placeholder="Bank Name">
    <button onclick="createAccount()">Create Account</button>
  </div>

  <!-- GET -->
  <div class="card">
    <h2>Get Account</h2>
    <input id="getAcc" placeholder="Account Number">
    <button onclick="getAccount()">Fetch Details</button>
  </div>

  <!-- UPDATE -->
  <div class="card">
    <h2>Update Account</h2>
    <input id="updAcc" placeholder="Account Number">
    <input id="updName" placeholder="Full Name">
    <input id="updMobile" placeholder="Mobile Number">
    <input id="updAddress" placeholder="Address">
    <button onclick="updateAccount()">Update</button>
  </div>

  <!-- DELETE -->
  <div class="card">
    <h2>Delete Account</h2>
    <input id="delAcc" placeholder="Account Number">
    <button onclick="deleteAccount()">Delete</button>
  </div>

  <pre id="output">🚀 Ready...</pre>

</div>

<script src="app.js"></script>

</body>
</html>
