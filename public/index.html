<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Bank — Modern Android</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded">
  <link rel="stylesheet" href="/style.css">
</head>

<body>

<header class="app-bar">
  <div class="app-bar__row">
    <div class="app-bar__title">
      <span class="material-symbols-rounded">account_balance</span>
      <div>
        <div class="title">Bank</div>
        <div class="subtitle">Android Material</div>
      </div>
    </div>
  </div>
</header>

<!-- LOGIN -->
<div id="loginSheet" class="overlay">
  <div class="sheet elevated">

    <h3>Login</h3>

    <input id="loginUser" placeholder="Username">
    <input id="loginPassword" type="password" placeholder="Password">
    <input id="loginPin" type="password" placeholder="PIN (optional)">

    <button id="btnLogin">Login / Register</button>

  </div>
</div>

<!-- APP -->
<main class="content">

  <section class="screen active" id="create">
    <h2>Create Account</h2>

    <input id="name" placeholder="Full Name">
    <input id="dob" placeholder="YYYYMMDD">
    <input id="mobile" placeholder="Mobile">
    <input id="email" placeholder="Email">
    <input id="address" placeholder="Address">

    <button id="btnCreate">Create</button>
  </section>

</main>

<div id="toasts"></div>

<script src="/config.js"></script>
<script src="/script.js"></script>
</body>
</html>
