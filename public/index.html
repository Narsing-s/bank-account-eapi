<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Bank – Android Material</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/style.css" />
</head>

<body>

<header class="app-bar">
  <h2>Bank – Android Material</h2>
  <button id="btnSettings">⚙️</button>
</header>

<!-- LOGIN -->
<div id="loginSheet" class="overlay">
  <div class="sheet">
    <h3>Login / Register</h3>
    <input id="loginUser" placeholder="Username" />
    <input id="loginPassword" type="password" placeholder="Password" />
    <input id="loginPin" type="password" placeholder="PIN (optional)" />
    <button id="btnLogin">Login</button>
  </div>
</div>

<main class="content">

<section>
  <h3>Create Account</h3>
  <input id="name" placeholder="Full Name" />
  <input id="dob" placeholder="YYYYMMDD" />
  <input id="mobile" placeholder="Mobile" />
  <input id="email" placeholder="Email" />
  <input id="address" placeholder="Address" />
  <input id="adharnumber" placeholder="Aadhaar" />
  <input id="bankname" placeholder="Bank Name" />
  <button id="btnCreate">Create</button>
</section>

<section>
  <h3>Get Account</h3>
  <input id="getAccountNumber" placeholder="Account Number" />
  <button id="btnGet">Fetch</button>
</section>

<section>
  <h3>✅ API Response</h3>
  <pre id="getResult"
       style="background:#111;color:#0f0;padding:12px;white-space:pre-wrap;">
  </pre>
</section>

<section>
  <h3>Update Account</h3>
  <input id="updateAccountNumber" placeholder="Account Number" />
  <input id="updateName" placeholder="Full Name" />
  <input id="updateMobile" placeholder="Mobile" />
  <input id="updateAddress" placeholder="Address" />
  <button id="btnUpdate">Update</button>
</section>

<section>
  <h3>Delete Account</h3>
  <input id="deleteAccountNumber" placeholder="Account Number" />
  <button id="btnDelete">Delete</button>
</section>

</main>

<div id="toasts"></div>

<script src="/config.js"></script>
<script src="/script.js"></script>
</body>
</html>
