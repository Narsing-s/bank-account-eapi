<!DOCTYPE html>
<html>
<head>
  <title>🏦 Banking App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>🏦 Smart Banking Dashboard</header>

<div class="container">

  <!-- CREATE -->
  <div class="card">
    <h2>Create Account</h2>
    <input id="name" placeholder="Full Name">
    <input id="dob" placeholder="YYYY-MM-DD">
    <input id="mobile" placeholder="Mobile">
    <input id="email" placeholder="Email">
    <input id="address" placeholder="Address">
    <input id="aadhar" placeholder="Aadhar Number">

    <select id="bank">
      <option value="SBI">SBI</option>
      <option value="HDFC">HDFC</option>
      <option value="ICICI">ICICI</option>
      <option value="AXIS">AXIS</option>
    </select>

    <button onclick="createAccount()">Create Account</button>
  </div>

  <!-- GET -->
  <div class="card">
    <h2>Get Account</h2>
    <input id="getAcc" placeholder="Account Number">
    <button onclick="getAccount()">Fetch Account</button>
  </div>

  <!-- UPDATE -->
  <div class="card">
    <h2>Update Account</h2>
    <input id="updAcc" placeholder="Account Number">
    <input id="updName" placeholder="Full Name">
    <input id="updMobile" placeholder="Mobile">
    <input id="updAddress" placeholder="Address">
    <button onclick="updateAccount()">Update</button>
  </div>

  <!-- DELETE -->
  <div class="card">
    <h2>Deactivate Account</h2>
    <input id="delAcc" placeholder="Account Number">
    <button onclick="deleteAccount()">Deactivate</button>
  </div>

  <!-- RESULT -->
  <div class="card">
    <h2>Result</h2>
    <div id="status">Ready</div>
    <div id="result"></div>
  </div>

</div>

<script src="app.js"></script>

</body>
</html>
