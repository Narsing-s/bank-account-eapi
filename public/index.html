<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Bank Portal — Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Theme Colors -->
  <meta name="theme-color" content="#0d1117" />

  <!-- Manifest & Service Worker -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Stylesheet -->
  <link rel="stylesheet" href="/style.css" />

  <!-- Icons -->
  <link rel="preconnect"ls+Rounded:wght,FILL@400,0;700,1

</head>
<body>

  <!-- TOPBAR -->
  <header id="topbar">
    <button id="sidebarToggle" class="icon-btn">
      <span class="material-symbols-rounded">menu</span>
    </button>
    <div class="title">Bank Portal</div>

    <div class="top-actions">
      <span id="netStatus" class="net offline">Offline</span>

      <button id="btnSettings" class="icon-btn">
        <span class="material-symbols-rounded">settings</span>
      </button>
    </div>
  </header>


  <!-- SIDEBAR -->
  <aside id="sidebar">
    <nav>
      <button class="nav-item active" data-screen="create">
        <span class="material-symbols-rounded">add_circle</span> Create
      </button>

      <button class="nav-item" data-screen="search">
        <span class="material-symbols-rounded">search</span> Search
      </button>

      <button class="nav-item" data-screen="update">
        <span class="material-symbols-rounded">edit</span> Update
      </button>

      <button class="nav-item" data-screen="delete">
        <span class="material-symbols-rounded">delete</span> Delete
      </button>

      <button class="nav-item" data-screen="txns">
        <span class="material-symbols-rounded">receipt_long</span> Transactions
      </button>
    </nav>
  </aside>


  <!-- MAIN CONTENT -->
  <main id="content">

    <!-- CREATE -->
    <section id="create" class="screen active">
      <h1>Create Account</h1>
      <div class="card">
        <div class="grid-2">
          <input id="name" placeholder="Full Name" />
          <input id="dob" placeholder="DOB YYYYMMDD" />
          <input id="mobile" placeholder="Mobile Number" />
          <input id="email" placeholder="Email" />
          <input id="address" placeholder="Address" class="span-2" />
          <input id="aadhaar" placeholder="Aadhaar (12 digits)" />
          <select id="bank">
            <option>SBI</option>
            <option>HDFC</option>
            <option>APGIVB</option>
            <option>AXIS</option>
            <option>ICICI</option>
          </select>
        </div>
        <button class="btn primary" id="btnCreate">Create</button>
      </div>
    </section>

    <!-- SEARCH -->
    <section id="search" class="screen">
      <h1>Search Account</h1>
      <div class="card">
        <input id="getAcc" placeholder="Account Number" />
        <button class="btn primary" id="btnSearch">Search</button>

        <div id="searchResult" class="result-box"></div>
      </div>
    </section>

    <!-- UPDATE -->
    <section id="update" class="screen">
      <h1>Update Account</h1>
      <div class="card">
        <input id="updateAcc" placeholder="Account Number" />

        <input id="updateName" placeholder="New Full Name" />
        <input id="updateEmail" placeholder="New Email" />
        <input id="updateMobile" placeholder="New Mobile" />

        <button class="btn primary" id="btnUpdate">Update</button>
      </div>
    </section>

    <!-- DELETE -->
    <section id="delete" class="screen">
      <h1>Delete Account</h1>
      <div class="card danger">
        <input id="deleteAcc" placeholder="Account Number" />
        <button class="btn danger" id="btnDelete">Delete</button>
      </div>
    </section>

    <!-- TRANSACTIONS -->
    <section id="txns" class="screen">
      <h1>Transactions</h1>
      <button class="btn primary" id="btnTxRefresh">Refresh</button>
      <div id="txList" class="txn-list"></div>
    </section>

  </main>


  <!-- SETTINGS DRAWER -->
  <div id="settingsDrawer" class="drawer hidden">
    <div class="drawer-content">
      <h2>Settings</h2>
      <button class="icon-btn close-btn" id="closeSettings">
        <span class="material-symbols-rounded">close</span>
      </button>

      <h3>Language</h3>
      <div class="chip-row">
        <button class="chip" data-lang="en">English</button>
        <button class="chip" data-lang="hi">हिंदी</button>
        <button class="chip" data-lang="te">తెలుగు</button>
      </div>

      <h3>Theme</h3>
      <div class="chip-row">
        <button class="chip" data-theme="system">System</button>
        <button class="chip" data-theme="light">Light</button>
        <button class="chip chip-active" data-theme="dark">Dark</button>
      </div>
    </div>
  </div>

  <!-- TOASTS -->
  <div id="toasts"></div>

  <!-- SCRIPT FILES -->
  <script src="/config.js"></script>
  <script src="/script.js"></script>

  <!-- Vercel Web Analytics -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js");
    }
  </script>

</body>
</html>
