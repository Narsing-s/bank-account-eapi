<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Bank — Modern Android</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0b57d0" />

  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded&display=swap">
  <link rel="stylesheet" href="/style.css" />
</head>

<body>

<header class="app-bar">
  <div class="app-bar__row">
    <div class="app-bar__title">
      <span class="material-symbols-rounded">account_balance</span>
      <div>
        <div class="title">Bank</div>
        <div class="subtitle">Android Material</div>
      </div>
    </div>
    <div class="app-bar__actions">
      <span id="statusText">Offline</span>
    </div>
  </div>
</header>

<!-- LOGIN -->
<div id="loginSheet" class="overlay hidden">
  <div class="sheet elevated">

    <h3>Secure Login</h3>

    <input id="loginUser" placeholder="Username" />
    <input id="loginPassword" type="password" placeholder="Password" />
    <input id="loginPin" type="password" placeholder="PIN" />

    <button id="btnLogin">Login</button>
    <button id="btnLogout">Logout</button>

  </div>
</div>

<!-- MAIN CONTENT (unchanged UI can go here) -->
<main class="content"></main>

<div id="toasts"></div>
<div id="loader" class="hidden">Loading…</div>

<script src="/config.js"></script>
<script src="/script.js"></script>
</body>
</html>
