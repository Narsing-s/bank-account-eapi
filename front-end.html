<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Narsing-Bank</title>
<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:#fff;
  overflow-x:hidden;
}
body.lock-scroll { overflow:hidden; }
.app-bar{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:rgba(0,0,0,0.3);
}
.card{
  background:rgba(255,255,255,0.1);
  margin:15px;
  padding:20px;
  border-radius:20px;
}
input,select,button{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:10px;
}
button{
  background:linear-gradient(45deg,#ff7eb3,#ff758c);
  color:white;
  cursor:pointer;
}
/* OVERLAY */
.overlay{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.85);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}
.hidden{display:none}
.login-box{
  background:white;
  color:black;
  padding:30px;
  border-radius:20px;
  width:300px;
  text-align:center;
  position:relative;
}
.password-container{
  position:relative;
}
.show-pass-btn{
  position:absolute;
  top:50%;
  right:10px;
  transform:translateY(-50%);
  background:transparent;
  border:none;
  cursor:pointer;
  font-size:0.9em;
  color:#555;
}
/* POPUP */
.popup{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#111;
  color:#0f0;
  padding:20px;
  border-radius:15px;
  max-width:90%;
  max-height:70%;
  overflow:auto;
  z-index:10000;
}
.popup.error{color:#ff4d4d}
</style>
</head>
<body>

<header class="app-bar">
<h2>💳 Narsing-Bank</h2>
<div>
<button onclick="openSettings()">⚙️</button>
<button onclick="logout()">🚪</button>
</div>
</header>

<!-- LOGIN POPUP -->
<div id="loginOverlay" class="overlay">
  <div class="login-box">
    <h2>Login</h2>
    <input id="loginUser" placeholder="Username" autofocus>
    <div class="password-container">
      <input id="loginPass" type="password" placeholder="Password">
      <button type="button" class="show-pass-btn" onclick="togglePassword()">👁️</button>
    </div>
    <button onclick="handleLogin()">Login</button>
  </div>
</div>

<!-- SETTINGS -->
<div id="settings" class="overlay hidden">
  <div class="login-box">
    <h3>API Settings</h3>
    <input id="apiUrl" placeholder="https://cloudhub-url">
    <button onclick="saveApi()">Save</button>
    <button onclick="closeSettings()">Close</button>
  </div>
</div>

<!-- CREATE ACCOUNT -->
<div class="card">
<h3>Create Account</h3>
<input id="name" placeholder="Full Name">
<input id="dob" type="date" placeholder="YYYY-MM-DD">
<input id="mobile" placeholder="Mobile">
<input id="email" placeholder="Email">
<input id="address" placeholder="Address">
<input id="adhar" placeholder="Aadhaar">
<select id="bank">
  <option value="">Loading banks...</option>
</select>
<button onclick="createAccount()">Create</button>
</div>

<!-- GET ACCOUNT -->
<div class="card">
<h3>Get Account</h3>
<input id="accGet" placeholder="Account Number">
<button onclick="getAccount()">Fetch</button>
</div>

<!-- UPDATE ACCOUNT -->
<div class="card">
<h3>Update Account</h3>
<input id="accUpdate" placeholder="Account Number">
<input id="upName" placeholder="Full Name">
<input id="upMobile" placeholder="Mobile">
<input id="upAddress" placeholder="Address">
<button onclick="updateAccount()">Update</button>
</div>

<!-- DELETE ACCOUNT -->
<div class="card">
<h3>Delete Account</h3>
<input id="accDelete" placeholder="Account Number">
<button onclick="deleteAccount()">Delete</button>
</div>

<script>
const $ = id => document.getElementById(id);
const SESSION="bank_user";

/******** LOGIN ********/
function handleLogin(){
  const u = $("loginUser").value.trim();
  const p = $("loginPass").value.trim();
  if(!u || !p){
    alert("Enter username & password");
    return;
  }
  localStorage.setItem(SESSION,"true");
  $("loginOverlay").classList.add("hidden");
  document.body.classList.remove("lock-scroll");
}

// Toggle password visibility
function togglePassword(){
  const pass = $("loginPass");
  if(pass.type === "password") pass.type = "text";
  else pass.type = "password";
}

// Press Enter to login
["loginUser","loginPass"].forEach(id => {
  $(id).addEventListener("keypress", e => {
    if(e.key==="Enter") handleLogin();
  });
});

function logout(){
  localStorage.removeItem(SESSION);
  location.reload();
}

// Show login overlay on page load if not logged in
document.addEventListener("DOMContentLoaded", () => {
  if(!localStorage.getItem(SESSION)){
    $("loginOverlay").classList.remove("hidden");
    document.body.classList.add("lock-scroll");
  } else {
    $("loginOverlay").classList.add("hidden");
  }
  $("apiUrl").value = localStorage.getItem("API_BASE")||"";
  loadBanksFromXML();
});

/******** SETTINGS ********/
let API_BASE = localStorage.getItem("API_BASE")||"";
function openSettings(){ $("settings").classList.remove("hidden"); }
function closeSettings(){ $("settings").classList.add("hidden"); }
function saveApi(){
  const url = $("apiUrl").value.trim();
  if(!url.startsWith("http")){
    alert("Invalid URL"); return;
  }
  API_BASE = url.replace(/\/$/,"");
  localStorage.setItem("API_BASE",API_BASE);
  alert("API Saved");
}
function API(path){ return API_BASE + path; }

/******** POPUP ********/
function showPopup(data,isError=false){
  const div = document.createElement("div");
  div.className = "popup" + (isError?" error":"");
  div.innerHTML =
    "<pre style='white-space:pre-wrap; word-break:break-word;'>"
    + (typeof data==="string"?data:JSON.stringify(data,null,2))
    + "</pre>"
    + "<button onclick='this.parentElement.remove()'>Close</button>";
  document.body.appendChild(div);
}

/******** FETCH ********/
async function safeFetch(url,method="GET",body=null){
  if(!API_BASE) throw new Error("API not set");
  const opt = {method};
  if(body){
    opt.body = JSON.stringify(body);
    opt.headers = {"Content-Type":"application/json"};
  }
  const res = await fetch(url,opt);
  const text = await res.text();
  let data;
  try{ data=JSON.parse(text); } catch{ data=text; }
  if(!res.ok) throw new Error(typeof data==="string"?data:JSON.stringify(data,null,2));
  return data;
}

/******** BANK LIST FROM XML ********/
const bankXML = `
<Banks>
  <Bank>HDFC</Bank>
  <Bank>ICICI</Bank>
  <Bank>SBI</Bank>
  <Bank>AXIS</Bank>
  <Bank>APGIVB</Bank>
</Banks>
`;
function loadBanksFromXML(){
  const parser = new DOMParser();
  const xmlDoc = parser.parseFromString(bankXML, "text/xml");
  const banks = xmlDoc.getElementsByTagName("Bank");
  const bankSelect = $("bank");
  bankSelect.innerHTML = "<option value=''>Select Bank</option>";
  for(let i=0;i<banks.length;i++){
    const opt = document.createElement("option");
    opt.value = banks[i].textContent;
    opt.text = banks[i].textContent;
    bankSelect.appendChild(opt);
  }
}

/******** CREATE ********/
async function createAccount(){
  try{
    const bank = $("bank").value;
    if(!bank){
      alert("Select a bank");
      return;
    }
    const qs = `?adharNumber=${$("adhar").value}&bankName=${bank}`;
    const payload = {
      FullName: $("name").value,
      dateOfBirth: $("dob").value,
      mobileNumber: $("mobile").value,
      email: $("email").value,
      address: $("address").value
    };
    const res = await safeFetch(API("/accounts"+qs),"POST",payload);
    showPopup(res);
  }catch(e){ showPopup(e.message,true); }
}

/******** GET ********/
async function getAccount(){
  try{
    const res = await safeFetch(API("/accounts/"+$("accGet").value));
    showPopup(res);
  }catch(e){ showPopup(e.message,true); }
}

/******** UPDATE ********/
async function updateAccount(){
  try{
    const payload = {
      FullName: $("upName").value,
      mobileNumber: $("upMobile").value,
      address: $("upAddress").value
    };
    const res = await safeFetch(API("/accounts/"+$("accUpdate").value),"PATCH",payload);
    showPopup(res);
  }catch(e){ showPopup(e.message,true); }
}

/******** DELETE ********/
async function deleteAccount(){
  try{
    const res = await safeFetch(API("/accounts/"+$("accDelete").value),"DELETE");
    showPopup(res || "Deleted successfully");
  }catch(e){ showPopup(e.message,true); }
}
</script>
</body>
</html>
