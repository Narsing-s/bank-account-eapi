<!DOCTYPE html>
<html>

<head>
  <title>Bank Account App</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>🏦 Bank Account EAPI</header>

<div class="container">

  <!-- Create Account -->
  <div class="card">
    <h2>Create Account</h2>
    <input id="name" placeholder="Full Name">
    <input id="dob" placeholder="YYYY-MM-DD">
    <input id="mobile" placeholder="Mobile Number">
    <input id="email" placeholder="Email">
    <input id="address" placeholder="Address">
    <input id="aadhar" placeholder="Aadhaar Number">
    <input id="bank" placeholder="Bank Name">
    <button onclick="createAccount()">Create</button>
  </div>

  <!-- Get Account -->
  <div class="card">
    <h2>Get Account</h2>
    <input id="getAcc" placeholder="Account Number">
    <button onclick="getAccount()">Fetch</button>
  </div>

  <!-- Update Account -->
  <div class="card">
    <h2>Update Account</h2>
    <input id="updAcc" placeholder="Account Number">
    <input id="updName" placeholder="Full Name">
    <input id="updMobile" placeholder="Mobile Number">
    <input id="updAddress" placeholder="Address">
    <button onclick="updateAccount()">Update</button>
  </div>

  <!-- Delete Account -->
  <div class="card">
    <h2>Delete Account</h2>
    <input id="delAcc" placeholder="Account Number">
    <button onclick="deleteAccount()">Delete</button>
  </div>

</div>

<pre id="output"></pre>

<script src="script.js"></script>

</body>
</html>
